global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  receiver: email-alert

receivers:
  - name: email-alert
    email_configs:
      - to: '${ALERT_RECEIVER_EMAIL}'
        send_resolved: true
